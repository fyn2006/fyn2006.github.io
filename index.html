

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
  }

  body {
    background-color: #0f172a;
    color: white;
    min-height: 100vh;
  }

  header {
    text-align: center;
    padding: 70px 20px 35px;
  }

  header h1 {
    font-size: 3.6rem;
    margin-bottom: 12px;
    letter-spacing: -1px;
  }

  header p {
    color: #cbd5e1;
    font-size: 1.15rem;
  }

  .projects {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 32px;
    max-width: 1350px;
    margin: auto;
    padding: 45px 40px 70px;
    overflow: visible;
  }

  .project-card {
    grid-column: span 2;
    position: relative;
    display: flex;
    flex-direction: column;
    overflow: visible;
    background-color: #1e293b;
    border: 1px solid #334155;
    border-radius: 22px;
    color: white;
    box-shadow: 0 10px 28px rgba(0, 0, 0, 0.28);
    transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
  }

  .project-card:nth-child(4) {
    grid-column: 2 / span 2;
  }

  .project-card:nth-child(5) {
    grid-column: 4 / span 2;
  }

  .project-card:hover {
    z-index: 1000;
    transform: translateY(-8px);
    border-color: #60a5fa;
    box-shadow: 0 18px 42px rgba(0, 0, 0, 0.4);
  }

  .project-card > img {
    width: 100%;
    height: 210px;
    object-fit: cover;
    display: block;
    border-top-left-radius: 22px;
    border-top-right-radius: 22px;
  }

  .project-info {
    display: flex;
    flex-direction: column;
    flex-grow: 1;
    padding: 24px;
  }

  .project-info h2 {
    font-size: 1.35rem;
    margin-bottom: 12px;
    line-height: 1.25;
  }

  .project-info p {
    color: #cbd5e1;
    line-height: 1.55;
    font-size: 0.96rem;
    flex-grow: 1;
  }

  .project-button {
    display: inline-block;
    width: fit-content;
    margin-top: 20px;
    padding: 11px 18px;
    background-color: #2563eb;
    color: white;
    border-radius: 12px;
    text-decoration: none;
    font-weight: bold;
    transition: background-color 0.2s ease, transform 0.2s ease;
  }

  .project-button:hover {
    background-color: #1d4ed8;
    transform: translateY(-2px);
  }

  .tooltip {
    position: relative;
    display: inline-block;
    color: #60a5fa;
    cursor: pointer;
    font-weight: bold;
    margin: 0 4px;
    z-index: 2000;
  }

  .tooltip-content {
    visibility: hidden;
    opacity: 0;
    width: 260px;
    background-color: #0f172a;
    color: white;
    border-radius: 14px;
    padding: 12px;
    text-align: left;
    position: absolute;
    z-index: 999999;
    bottom: 140%;
    left: 50%;
    transform: translateX(-50%) translateY(8px);
    transition: opacity 0.25s ease, transform 0.25s ease;
    box-shadow: 0 16px 35px rgba(0, 0, 0, 0.55);
    border: 1px solid #334155;
    pointer-events: none;
  }

  .tooltip-content img {
    width: 100%;
    height: auto;
    border-radius: 10px;
    margin-bottom: 10px;
    display: block;
  }

  .tooltip-content strong {
    display: block;
    margin-bottom: 6px;
    font-size: 1rem;
    color: white;
  }

  .tooltip-text {
    font-size: 0.85rem;
    color: #cbd5e1;
    line-height: 1.4;
    font-weight: normal;
  }

  .tooltip:hover {
    z-index: 999999;
  }

  .tooltip:hover .tooltip-content {
    visibility: visible;
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  footer {
    text-align: center;
    padding: 32px;
    color: #94a3b8;
    font-size: 0.9rem;
    border-top: 1px solid #334155;
  }

  @media (max-width: 1050px) {
    .projects {
      grid-template-columns: repeat(2, 1fr);
    }

    .project-card,
    .project-card:nth-child(4),
    .project-card:nth-child(5) {
      grid-column: auto;
    }
  }

  @media (max-width: 700px) {
    header h1 {
      font-size: 2.7rem;
    }

    .projects {
      grid-template-columns: 1fr;
      padding: 35px 20px 55px;
    }

    .project-card > img {
      height: 220px;
    }
  }
</style>
